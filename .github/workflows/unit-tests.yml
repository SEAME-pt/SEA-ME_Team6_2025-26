name: unit-tests

on:
  pull_request:
    branches: [development]

permissions:
  contents: read
  packages: read

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout repository
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      # -------------------------
      # Login to GHCR
      # -------------------------
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # -------------------------
      # Pull test image
      # -------------------------
      - name: Pull test image
        run: docker pull ghcr.io/seame-pt/sea-me_team6_2025-26/seame-tests:latest

      # -------------------------
      # Configure + Build + Run tests
      # -------------------------
      - name: Configure + Build + Run tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            ghcr.io/seame-pt/sea-me_team6_2025-26/seame-tests:latest \
            bash -c "
              set -e

              # -------------------------
              # Install system packages + Python deps
              # -------------------------
              apt-get update && \
              apt-get install -y python3 python3-pip python3-dev build-essential libffi-dev && \
              python3 -m pip install --upgrade pip && \
              python3 -m pip install --no-cache-dir -r src/tests/unit/python/requirements.txt

              # -------------------------
              # Debug: confirm 'can' installed
              # -------------------------
              python3 -c 'import can; print(\"python-can version:\", can.__version__)'

              # -------------------------
              # Build C++ tests
              # -------------------------
              rm -rf src/tests/build && \
              cmake -S src/tests -B src/tests/build -G Ninja \
                -DCMAKE_BUILD_TYPE=Debug \
                -DENABLE_CPP_TESTS=ON \
                -DENABLE_PYTHON_TESTS=ON \
                -DENABLE_COVERAGE=ON && \
              cmake --build src/tests/build

              # -------------------------
              # Run only C++ tests
              # -------------------------
              ctest --test-dir src/tests/build --output-on-failure --parallel \$(nproc) -LE python

              # -------------------------
              # Run Python tests
              # -------------------------
              python3 -m pytest src/tests/unit/python --junitxml=src/tests/test-results.xml
            "

      # -------------------------
      # Upload Python JUnit results
      # -------------------------
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: src/tests/test-results.xml

      # -------------------------
      # Generate C++ coverage
      # -------------------------
      - name: Generate coverage HTML
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work/src/tests \
            ghcr.io/seame-pt/sea-me_team6_2025-26/seame-tests:latest \
            bash -c '
              set -e
              rm -rf coverage_html coverage.info coverage_filtered.info
              lcov --directory build --capture --output-file coverage.info
              lcov --remove coverage.info "/usr/*" "*/_deps/*" "*/src/tests/*" "*/inc/*" \
                   --output-file coverage_filtered.info
              genhtml coverage_filtered.info --output-directory coverage_html
            '

      # -------------------------
      # Upload coverage artifact
      # -------------------------
      - name: Upload coverage HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage_html
          path: src/tests/coverage_html
