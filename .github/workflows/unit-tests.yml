name: cpp-unit-tests

on:
  pull_request:
    branches: [development]

permissions:
  contents: read
  packages: read

jobs:
  cpp-tests:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout repository
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      # -------------------------
      # Login to GHCR
      # -------------------------
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # -------------------------
      # Pull test image
      # -------------------------
      - name: Pull test image
        run: docker pull ghcr.io/seame-pt/sea-me_team6_2025-26/seame-tests:latest

      # -------------------------
      # Build + Run C++ tests
      # -------------------------
      - name: Build + Run C++ tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work/src/tests \
            ghcr.io/seame-pt/sea-me_team6_2025-26/seame-tests:latest \
            bash -c "
              set -e

              # -------------------------
              # Build C++ tests
              # -------------------------
              rm -rf build && \
              cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Debug \
                -DENABLE_CPP_TESTS=ON \
                -DENABLE_PYTHON_TESTS=OFF \
                -DENABLE_COVERAGE=ON && \
              cmake --build build

              # -------------------------
              # Run ONLY C++ tests
              # -------------------------
              ctest --test-dir build --output-on-failure --parallel \$(nproc)
            "

      # -------------------------
      # Generate C++ coverage
      # -------------------------
      - name: Generate coverage HTML
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work/src/tests \
            ghcr.io/seame-pt/sea-me_team6_2025-26/seame-tests:latest \
            bash -c '
              set -e
              rm -rf coverage_html coverage.info coverage_filtered.info
              lcov --directory build --capture --output-file coverage.info
              lcov --remove coverage.info "/usr/*" "*/_deps/*" "*/src/tests/*" "*/inc/*" \
                   --output-file coverage_filtered.info
              genhtml coverage_filtered.info --output-directory coverage_html
            '

      # -------------------------
      # Upload coverage artifact
      # -------------------------
      - name: Upload coverage HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage_html
          path: src/tests/coverage_html
